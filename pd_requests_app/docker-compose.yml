services:
  postgres:
    image: postgres:16
    container_name: pd_requests_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pd_requests_db
      POSTGRES_USER: pd_app
      POSTGRES_PASSWORD: pd_app_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pd_app -d pd_requests_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
