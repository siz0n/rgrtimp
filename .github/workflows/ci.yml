name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    name: Test backend and frontend
    runs-on: ubuntu-latest

    steps:
      - name: Получение исходного кода
        uses: actions/checkout@v6

      - name: Установка Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            pd_requests_app/backend/package-lock.json
            pd_requests_app/frontend/package-lock.json

      - name: Установка зависимостей backend
        working-directory: pd_requests_app/backend
        run: npm ci

      - name: Тестирование backend
        working-directory: pd_requests_app/backend
        run: npm test

      - name: Установка зависимостей frontend
        working-directory: pd_requests_app/frontend
        run: npm ci

      - name: Тестирование frontend
        working-directory: pd_requests_app/frontend
        run: npm test

      - name: Сборка frontend
        working-directory: pd_requests_app/frontend
        run: npm run build
